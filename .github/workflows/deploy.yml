name: Build and Deploy (Production)

on:
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            compose:
              - 'docker-compose.prod.yml'

  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.compose == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build backend (shared layer)
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/st_project:backend-latest ./backend

      - name: Tag & Push API
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/st_project:backend-latest ${{ secrets.DOCKERHUB_USERNAME }}/st_project:api-latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/st_project:api-latest

      - name: Tag & Push Worker
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/st_project:backend-latest ${{ secrets.DOCKERHUB_USERNAME }}/st_project:worker-latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/st_project:worker-latest
          
  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.compose == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/st_project:frontend-latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/st_project:frontend-latest

