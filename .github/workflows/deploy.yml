name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'

env:
  DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "$DOCKER_USER" --password-stdin

      # -----------------
      # Build API
      # -----------------
      - name: Build backend (shared)
        run: docker build -t $DOCKER_USER/st_project:backend-latest ./backend

      - name: Tag API
        run: docker tag $DOCKER_USER/st_project:backend-latest $DOCKER_USER/st_project:api-latest

      - name: Push API
        run: docker push $DOCKER_USER/st_project:api-latest

      # -----------------
      # Build Worker
      # -----------------
      - name: Tag Worker
        run: docker tag $DOCKER_USER/st_project:backend-latest $DOCKER_USER/st_project:worker-latest

      - name: Push Worker
        run: docker push $DOCKER_USER/st_project:worker-latest

      # -----------------
      # Build Frontend
      # -----------------
      - name: Build Frontend
        run: docker build -t $DOCKER_USER/st_project:frontend-latest ./frontend

      - name: Push Frontend
        run: docker push $DOCKER_USER/st_project:frontend-latest

