services:
  db:
    image: postgres:15-alpine
    container_name: st_project_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: st_project_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: st_project_api
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - ${PWD}/experiments:/app/experiments
      - ${PWD}/uploads:/app/uploads


  worker:
    build: .
    container_name: st_project_worker
    command: celery -A app.core.celery.celery_app worker --loglevel=info --concurrency=1
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}/experiments:/app/experiments
      - ${PWD}/uploads:/app/uploads


volumes:
  postgres_data:
    external: true
    name: db_postgres_data