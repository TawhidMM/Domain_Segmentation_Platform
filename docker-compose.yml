services:
  db:
    image: postgres:15-alpine
    container_name: st_project_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: st_project_redis
    restart: unless-stopped
    networks:
      - backend

  api:
    build:
      context: ./backend
      args:
        DOCKER_GID: ${DOCKER_GID}
    container_name: st_project_api
    image: tawhidmm/st_project:api-latest
    restart: unless-stopped
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - ./backend/experiments:/app/experiments
      - ./backend/uploads:/app/uploads
    networks:
      - backend
      - frontend

  worker:
    build:
      context: ./backend
      args:
        DOCKER_GID: ${DOCKER_GID}
    container_name: st_project_worker
    image: tawhidmm/st_project:worker-latest
    command: celery -A app.core.celery.celery_app worker --loglevel=info --concurrency=1
    restart: unless-stopped
    depends_on:
      - db
      - redis
    env_file:
      - .env
    group_add:
      - "${DOCKER_GID}"  
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend/experiments:/app/experiments
      - ./backend/uploads:/app/uploads
    networks:
      - backend

  frontend:
    build: ./frontend
    image: tawhidmm/st_project:frontend-latest
    container_name: st_project_frontend
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - frontend

  nginx:
    image: nginx:alpine
    container_name: st_project_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - api
    networks:
      - frontend

volumes:
  postgres_data:
    external: true
    name: db_postgres_data

networks:
  backend:
  frontend: